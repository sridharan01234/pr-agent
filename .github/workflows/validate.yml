name: Validate Repository Configuration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          if [ -d .github/hooks ]; then
            find .github/hooks -name "*.json" -print0 | xargs -0 -I{} sh -c 'echo "Checking {}..." && python3 -c "import json; json.load(open(\"{}\"))"'
          fi
          echo "All JSON files are valid."

      - name: Validate YAML frontmatter
        run: |
          echo "Validating YAML frontmatter..."
          files=""
          [ -d .github/instructions ] && files="$files $(find .github/instructions -name "*.instructions.md")"
          [ -d .github/agents ] && files="$files $(find .github/agents -name "*.agent.md")"
          [ -d .github/prompts ] && files="$files $(find .github/prompts -name "*.prompt.md")"
          [ -d .github/skills ] && files="$files $(find .github/skills -name "SKILL.md")"
          files="${files# }"
          if [ -z "$files" ]; then
            echo "No files to validate — skipping."
          else
            for file in $files; do
              echo "Checking $file..."
              awk 'NR>1 && /^---$/{exit} NR>1' "$file" | python3 -c "import sys, yaml; yaml.safe_load(sys.stdin)" || { echo "FAILED: $file"; exit 1; }
            done
            echo "All frontmatter is valid YAML."
          fi

      - name: Check for banned terms
        run: |
          echo "Checking for banned Claude Code-specific terms in config files..."
          FAILED=0
          for dir in .github/instructions .github/agents .github/prompts .github/skills .github/hooks; do
            if [ ! -d "$dir" ]; then continue; fi
            for file in $(find "$dir" -type f 2>/dev/null); do
              if grep -liE "CLAUDE\.md" "$file" 2>/dev/null; then
                echo "FAILED: $file contains banned term 'CLAUDE.md'"
                FAILED=1
              fi
            done
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "No banned terms found in configuration files."

      - name: Validate files end with newline
        run: |
          echo "Checking files end with newline..."
          FAILED=0
          for file in $(find . -type f \( -name "*.md" -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" \) -not -path "./.git/*" -not -path "./node_modules/*"); do
            if [ -s "$file" ] && [ "$(tail -c1 "$file" | xxd -p)" != "0a" ]; then
              echo "FAILED: $file does not end with newline"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "All files end with newline."

      - name: Validate skill directory names match SKILL.md name field
        run: |
          echo "Validating skill name consistency..."
          if [ ! -d .github/skills ]; then
            echo "No skills directory — skipping."
            exit 0
          fi
          for skill_dir in .github/skills/*/; do
            [ -d "$skill_dir" ] || continue
            dir_name=$(basename "$skill_dir")
            skill_file="$skill_dir/SKILL.md"
            if [ -f "$skill_file" ]; then
              skill_name=$(awk 'NR>1 && /^---$/{exit} NR>1' "$skill_file" | grep "^name:" | sed 's/name: *//;s/"//g;s/'\''//g' | tr -d '[:space:]')
              if [ "$dir_name" != "$skill_name" ]; then
                echo "FAILED: Skill directory '$dir_name' does not match SKILL.md name '$skill_name'"
                exit 1
              fi
            fi
          done
          echo "All skill names are consistent."
